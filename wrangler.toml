name = "zudo-panel-designer"
compatibility_date = "2026-07-11"

# preview_urls silently defaults to match workers_dev, so an omitted value
# here would flip along with workers_dev. Set both explicitly everywhere.
workers_dev = false
preview_urls = false

# Static-only Workers Static Assets site: no Worker script, no Functions,
# no D1/R2/KV in stage 1. `assets` is inherited by every named environment
# below, so it does not need to be repeated under [env.production].
[assets]
directory = "./packages/app/dist"
not_found_handling = "single-page-application"

# Env the PR preview workflow targets:
# `wrangler versions upload --env preview --preview-alias pr-N`.
[env.preview]
workers_dev = false
preview_urls = true

# Custom-domain route lives on the production environment only, so a
# `wrangler versions upload` / plain `wrangler deploy` preview stays on the
# generated *.workers.dev URL and never serves the real domain.
[env.production]
workers_dev = false
preview_urls = false

[[env.production.routes]]
pattern = "zudo-panel-designer.takazudomodular.com"
custom_domain = true
