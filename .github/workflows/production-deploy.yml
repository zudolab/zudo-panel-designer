name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-app:
    name: Build and deploy app to Cloudflare Workers
    # A manual workflow_dispatch from a non-main branch/tag must not deploy —
    # only main is allowed to reach production. (push already fires on main only.)
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail   # `wrangler | tee` otherwise masks failure with tee's exit 0
          exit_ok=0
          for attempt in 1 2 3; do
            if pnpm exec wrangler deploy --env production 2>&1 | tee /tmp/wrangler-prod.log; then
              exit_ok=1
              break
            fi
            [ "$attempt" -lt 3 ] && sleep 60
          done
          [ "$exit_ok" -eq 1 ] || exit 1

      - name: Smoke check
        run: |
          # First-ever deploy provisions DNS + TLS via custom_domain = true,
          # so give it time to settle before failing.
          check() {
            url="$1"
            for attempt in 1 2 3 4 5 6; do
              status=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
              if [ "$status" = "200" ]; then
                echo "OK ($status): $url"
                return 0
              fi
              echo "Attempt $attempt: $url returned $status"
              [ "$attempt" -lt 6 ] && sleep 20
            done
            echo "FAILED: $url did not return 200 after retries"
            return 1
          }
          check "https://zudo-panel-designer.takazudomodular.com/"
          # Any non-root path proves the SPA fallback (not_found_handling =
          # single-page-application in wrangler.toml) serves index.html.
          check "https://zudo-panel-designer.takazudomodular.com/spa-fallback-check"

  deploy-doc:
    name: Build and deploy doc site to Cloudflare Workers
    # A manual workflow_dispatch from a non-main branch/tag must not deploy —
    # only main is allowed to reach production. (push already fires on main only.)
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: doc/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: doc
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: doc
        run: pnpm build

      - name: Write dist/.assetsignore
        working-directory: doc
        run: |
          printf '%s\n' "_worker.js" "_zfb_inner.mjs" > dist/.assetsignore

      - name: Deploy to Cloudflare Workers
        working-directory: doc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail   # `wrangler | tee` otherwise masks failure with tee's exit 0
          exit_ok=0
          for attempt in 1 2 3; do
            if pnpm exec wrangler deploy --env production 2>&1 | tee /tmp/wrangler-doc-prod.log; then
              exit_ok=1
              break
            fi
            [ "$attempt" -lt 3 ] && sleep 60
          done
          [ "$exit_ok" -eq 1 ] || exit 1

      - name: Smoke check
        run: |
          # First-ever deploy provisions DNS + TLS via custom_domain = true,
          # so give it time to settle before failing.
          check() {
            url="$1"
            for attempt in 1 2 3 4 5 6; do
              status=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
              if [ "$status" = "200" ]; then
                echo "OK ($status): $url"
                return 0
              fi
              echo "Attempt $attempt: $url returned $status"
              [ "$attempt" -lt 6 ] && sleep 20
            done
            echo "FAILED: $url did not return 200 after retries"
            return 1
          }
          check "https://doc-zudo-panel-designer.takazudomodular.com/"
          check "https://doc-zudo-panel-designer.takazudomodular.com/docs/overview/"
          check "https://doc-zudo-panel-designer.takazudomodular.com/ja/docs/overview/"
